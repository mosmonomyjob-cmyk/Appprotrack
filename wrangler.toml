# Wrangler configuration file for Cloudflare Pages deployment.
# Place this file in the root of your repository.

name = "appprotrack"

# Define Pages build folder (root directory contains our static assets)
pages_build_output_dir = "."

# Bindings for Cloudflare D1 Database
[[d1_databases]]
binding = "DB"                                   # Binding name used in backend context: context.env.DB
database_name = "appprotrack-db"                 # The D1 database name in Cloudflare
database_id = "1b72feac-264a-420c-b472-e265ffe332da"                 # Replace with your actual D1 Database ID from Cloudflare Dashboard
